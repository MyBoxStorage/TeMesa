name: Cron — Expirar reservas pendentes

# Roda a cada 5 minutos
# Chama /api/cron/expire-pending no TeMesa em produção
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: # permite rodar manualmente no GitHub

jobs:
  expire-pending:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar endpoint de expiração
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://unique-sfogliatella-a00c01.netlify.app/api/cron/expire-pending")
          echo "HTTP status: $response"
          if [ "$response" != "200" ]; then
            echo "Erro: status $response"
            exit 1
          fi
